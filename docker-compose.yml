version: "3.9"

services:
  backend:
    build: ./backend
    image: my-backend:1.0
    container_name: express_app
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - /app/node_modules
    restart: always

  frontend:
    build: ./frontend
    image: my-fronent:1.0
    container_name: vue_app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: always
    depends_on:
      - backend
